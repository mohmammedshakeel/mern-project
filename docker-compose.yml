version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    environment:
      MONGO_INITDB_DATABASE: employees
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - mern-network

  backend:
    build:
      context: ./mern/backend
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "5050:5050"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/employees
      - PORT=5050
    depends_on:
      - mongodb
    networks:
      - mern-network

  frontend:
    build:
      context: ./mern/frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - mern-network

volumes:
  mongo_data:

networks:
  mern-network:
    driver: bridge
